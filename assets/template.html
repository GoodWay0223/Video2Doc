<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【视频深度分析】{TITLE} — {UPLOADER}</title>
<style>
/* === Reset & Base === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  line-height:1.75;
  color:#1a1a2e;
  background:#fafafa;
  -webkit-font-smoothing:antialiased;
}

/* === Header === */
header{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  padding:2.5rem 1.5rem;
  text-align:center;
}
header h1{font-size:1.6rem;font-weight:700;margin-bottom:.5rem;color:#111}
header .meta{font-size:.9rem;color:#6b7280}
header .meta span{margin:0 .5rem}
header .tags{margin-top:1rem;display:flex;flex-wrap:wrap;justify-content:center;gap:.4rem}
header .tag{
  display:inline-block;padding:.15rem .6rem;
  background:#f3f4f6;color:#4b5563;border-radius:999px;
  font-size:.78rem;
}

/* === Navigation === */
nav.toc{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid #e5e7eb;
  padding:.6rem 1.2rem;overflow-x:auto;white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
nav.toc a{
  display:inline-block;padding:.3rem .7rem;margin-right:.3rem;
  color:#4b5563;text-decoration:none;font-size:.85rem;
  border-radius:6px;transition:all .15s;
}
nav.toc a:hover,nav.toc a.active{background:#2563eb;color:#fff}

/* === Main content === */
main{max-width:820px;margin:0 auto;padding:2rem 1.2rem}

/* === Chapter section === */
.chapter{margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid #e5e7eb}
.chapter:last-child{border-bottom:none}
.chapter h2{
  font-size:1.35rem;font-weight:700;margin-bottom:.8rem;
  color:#111;display:flex;align-items:center;gap:.5rem
}
.chapter h2 .ch-num{
  background:#2563eb;color:#fff;font-size:.75rem;
  padding:.15rem .5rem;border-radius:4px;white-space:nowrap
}
.chapter h3{font-size:1.1rem;font-weight:600;margin:1.2rem 0 .5rem;color:#1f2937}
.chapter p{margin-bottom:.8rem}

/* === Content blocks === */
.content-block{margin-bottom:1.2rem}
.content-block .label{
  display:inline-block;font-size:.75rem;font-weight:600;
  padding:.1rem .5rem;border-radius:4px;margin-bottom:.4rem
}
.label-problem{background:#fef2f2;color:#dc2626}
.label-trap{background:#fffbeb;color:#d97706}
.label-step{background:#eff6ff;color:#2563eb}
.label-conclusion{background:#f0fdf4;color:#16a34a}
.label-quote{background:#f5f3ff;color:#7c3aed}

/* Quote block */
blockquote.quote{
  border-left:3px solid #2563eb;padding:.5rem 1rem;
  margin:1rem 0;background:#f8fafc;font-style:italic;
  color:#4b5563
}
blockquote.quote .ts{
  font-style:normal;font-size:.8rem;color:#9ca3af;
  display:block;margin-top:.3rem
}

/* === Figures (diagrams & screenshots) === */
figure{margin:1.5rem 0}
figure svg{
  display:block;max-width:100%;height:auto;
  border:1px solid #e5e7eb;border-radius:8px;
  background:#fff
}
figure img{
  display:block;max-width:100%;height:auto;
  border:1px solid #e5e7eb;border-radius:8px
}
figure figcaption{
  text-align:center;font-size:.82rem;color:#6b7280;
  margin-top:.5rem
}
figcaption .icon-diagram{color:#2563eb}
figcaption .icon-screenshot{color:#f59e0b}

/* === Timestamp link === */
a.ts-link{
  color:#2563eb;text-decoration:none;
  font-family:"SF Mono",Monaco,monospace;font-size:.85rem;
  padding:.05rem .3rem;border-radius:3px;background:#eff6ff
}
a.ts-link:hover{background:#dbeafe;text-decoration:underline}

/* === Footer === */
footer{
  text-align:center;padding:2rem;color:#9ca3af;
  font-size:.8rem;border-top:1px solid #e5e7eb
}

/* === Print === */
@media print{
  nav.toc{display:none}
  body{font-size:12pt}
  .chapter{page-break-inside:avoid}
}

/* === Responsive === */
@media(max-width:640px){
  header{padding:1.5rem 1rem}
  header h1{font-size:1.3rem}
  main{padding:1rem .8rem}
  .chapter h2{font-size:1.15rem}
}
</style>
</head>
<body>

<header>
  <h1>{TITLE}</h1>
  <div class="meta">
    <span>UP主：{UPLOADER}</span>
    <span>时长：{DURATION}</span>
    <span>来源：{SOURCE}</span>
  </div>
  <div class="tags">{TAGS}</div>
</header>

<nav class="toc" id="toc">
  <!-- Generated dynamically from chapters -->
</nav>

<main>
  <!-- CHAPTERS INSERTED HERE -->
</main>

<footer>
  由 WorkBuddy Video Deep Doc 自动生成 · {GENERATED_AT}
</footer>

<script>
// Timestamp seek — customize based on whether audio/video is embedded
function seekTo(seconds) {
  const target = document.getElementById('ch' + Math.floor(seconds/60));
  if (target) target.scrollIntoView({behavior:'smooth'});
}
// Highlight active TOC item on scroll
(function(){
  const toc = document.getElementById('toc');
  if (!toc) return;
  const links = toc.querySelectorAll('a');
  const chapters = document.querySelectorAll('.chapter');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting){
        const id = e.target.id;
        links.forEach(l => l.classList.toggle('active', l.getAttribute('href')==='#'+id));
      }
    });
  }, {rootMargin:'-20% 0px -70% 0px'});
  chapters.forEach(c => observer.observe(c));
})();
</script>

</body>
</html>
